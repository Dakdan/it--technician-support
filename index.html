<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Maintenance And Service - รพ.อุดรธานี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --pink-soft: #fff5f7; --pink-primary: #ff85a2; --pink-dark: #d63384; --white: #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, var(--white) 0%, var(--pink-soft) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.95); border-radius: 30px; box-shadow: 0 20px 40px rgba(255, 133, 162, 0.12); width: 100%; max-width: 440px; padding: 3rem 2rem; text-align: center; }
        .logo-wrapper { width: 130px; height: 130px; margin: 0 auto 1.25rem; background: white; border-radius: 50%; border: 3px solid var(--pink-primary); display: flex; align-items: center; justify-content: center; }
        .logo-img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        .form-control { border-radius: 12px; padding: 10px 18px; border: 1.5px solid #ffeef2; }
        .btn-submit { background: linear-gradient(45deg, #ff85a2, #d63384); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: 500; transition: all 0.3s; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-danger" role="status"></div>
    <div class="mt-3 fw-bold">กำลังตรวจสอบข้อมูล...</div>
</div>

<div class="login-card">
    <div class="logo-wrapper">
        <img src="https://img2.pic.in.th/logo18fee7f1cab4f0ab8.png" alt="UDH Logo" class="logo-img">
    </div>
    <h4 class="text-pink-dark fw-bold">IT UDON HOSP App</h4>
    <p class="text-muted">โรงพยาบาลอุดรธานี</p>

    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label">ชื่อผู้ใช้งาน (User Login)</label>
            <input type="text" id="userpn" class="form-control" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">รหัสผ่าน (Password)</label>
            <input type="password" id="userpw" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-submit">เข้าสู่ระบบ</button>
    </form>
</div>

<div class="modal fade" id="alertModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 p-4 text-center">
            <h5 id="alertTitle"></h5>
            <p id="alertMsg" class="text-muted"></p>
            <button class="btn btn-submit" data-bs-dismiss="modal">ตกลง</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwPk2LYTrUxUkEZmTuwrZ6vWtInLSbzTC7fscaKo7AENJ3cua0Nufl36OCFES3fqGw8hg/exec";
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: 'login',
                    username: document.getElementById('userpn').value.trim(),
                    password: document.getElementById('userpw').value
                })
            });

            const result = await response.json();
            document.getElementById('loadingOverlay').style.display = 'none';

            if (!result.success) {
                showAlert('เข้าสู่ระบบไม่สำเร็จ', result.message);
                return;
            }

            // บันทึกข้อมูลรวมถึง Token (ที่มาจาก code.gs ใหม่) ลงใน localStorage
            localStorage.setItem('currentUser', JSON.stringify(result.data));

            if (result.resetRequired) {
                window.location.href = 'change-password.html';
            } else {
                window.location.href = 'main_menu.html';
            }
        } catch (err) {
            document.getElementById('loadingOverlay').style.display = 'none';
            showAlert('ระบบขัดข้อง', 'ไม่สามารถเชื่อมต่อ Server ได้');
        }
    });

    function showAlert(title, msg) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = msg;
        new bootstrap.Modal(document.getElementById('alertModal')).show();
    }
</script>
</body>
</html>
